<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equestria RPG & Map</title>
    <style>
        /* CSS MANTIDO E OTIMIZADO */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0e6ff; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #800080; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #600060; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; cursor: pointer; border: 4px solid transparent; transition: 0.3s; object-fit: cover; }
        .avatar.selected { border-color: #800080; transform: scale(1.1); box-shadow: 0 0 10px rgba(128,0,128,0.5); }
        .poney-list { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 20px 0; justify-items: center; }
        .link { color: #800080; cursor: pointer; margin-top: 15px; text-decoration: underline; font-size: 14px; }
        .mapa-wrapper { position: relative; width: 100%; overflow: hidden; border-radius: 10px; }
        .mapa-img { width: 100%; display: block; }
        .ponto { position: absolute; width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
        .desbloqueado { background: #28a745; }
        .bloqueado { background: #dc3545; }
        .avatar-grande { width: 120px; height: 120px; border-radius: 50%; margin: 20px auto; display: block; border: 4px solid #800080; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 10px; font-size: 12px; }
        .logout-btn { background: #dc3545; }
        .card { padding: 10px; border-radius: 5px; color: white; font-weight: bold; text-transform: uppercase; margin: 5px; }
        .comum { background: #aaa; }
        .rara { background: #007bff; }
        .lendaria { background: #ffc107; color: #000; }
        #lista-cartas { display: grid; grid-template-columns: 1fr 1fr; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container" id="cadastro">
        <form id="form-cadastro">
            <h1>Criar Conta</h1>
            <div class="input-group">
                <label>Nome de Usuário</label>
                <input id="nome" placeholder="Ex: TwilightSparkle" required>
            </div>
            <div class="input-group">
                <label>Data de Nascimento</label>
                <input id="nascimento" placeholder="dd/mm/aaaa" maxlength="10" oninput="formatarData(this)" required>
            </div>
            <div class="input-group">
                <label>Gênero</label>
                <select id="genero" required>
                    <option value="">Selecione...</option>
                    <option>Feminino</option>
                    <option>Masculino</option>
                    <option>Outro</option>
                </select>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Sua senha secreta" required>
            </div>
            <button type="button" onclick="irParaSelecaoPoney()">Próximo: Escolher Avatar</button>
        </form>
        <p class="link" onclick="mostrarLogin()">Já tenho conta</p>
    </div>

    <div class="container" id="selecao-poney" style="display:none;">
        <h1>Escolha seu Pônei</h1>
        <p>Este será seu avatar oficial em Equestria</p>
        <div class="poney-list">
            <img src="https://media.wired.com/photos/59337ed17965e75f5f3c8503/3:2/w_2560%2Cc_limit/MLP-Twilight.jpg" class="avatar" onclick="selecionarPoney(this,'Twilight')" alt="Twilight">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQcko1WFEG5FIPA6grJXd1cWJAXiSHAQP0LdzVhOdGJqpi-V0b0it6CxiKlAjuldaNIOs3DutSq5MAlWRPmgMXkgBnC9iWvw8Kga-tLL_Bh&s=10" class="avatar" onclick="selecionarPoney(this,'Fluttershy')" alt="Fluttershy">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSGk1NmbGDPaUJCLlN4uhOtHeJTsAWeBvh3Eg6_wJ0YIOOnbHjn3vZ4NbVPd8XT1D9i_4l21vlY-Xg4sX_8j5nZ5qZexcBFiDbxyxXq_xZdZQ&s=10" class="avatar" onclick="selecionarPoney(this,'Rainbow')" alt="Rainbow">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQrX51t_lIv-XJw9lQHe2lkAWGZm6KBkOwrOIpBtnouBpYVWuQsaNGJvRgkhcnROL70xYvyWXk8IYnGdfxp51X6651Mkn2nq1vQg8R3jAWe&s=10" class="avatar" onclick="selecionarPoney(this,'Rarity')" alt="Rarity">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfsKVElxJR57blusabDhZZgE8RK7COxWgPqowcREHKQ9etkKq3qQT2MfTBAOz0BaqwiXMGaVUsYR5XOHF3mAKRrQxPjIOuhl1ixwRp9JGF&s=10" class="avatar" onclick="selecionarPoney(this,'Applejack')" alt="Applejack">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLcS6NnetzUhMydMsgoVqH--MRvgEEOdM2pB8zBA2XFxGw68DoST-Honi6jydIv-1jm7eHEaLX_DptXWURHIAJ8tr3z4BCihCgEUMnGMpvoQ&s=10" class="avatar" onclick="selecionarPoney(this,'Pinkie')" alt="Pinkie">
        </div>
        <button onclick="finalizarCadastro()">Concluir Cadastro</button>
        <p class="link" onclick="voltarParaCadastro()">Voltar</p>
    </div>

    <div class="container" id="login" style="display:none;">
        <h1>Bem-vindo!</h1>
        <div class="input-group">
            <label>Nome</label>
            <input id="loginNome" placeholder="Seu nome">
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input id="loginSenha" type="password" placeholder="Sua senha">
        </div>
        <button onclick="entrar()">Entrar no Jogo</button>
        <button style="background:#6c757d; margin-top:10px;" onclick="visitante()">Entrar como visitante</button>
        <p class="link" onclick="mostrarCadastro()">Não tem conta? Criar agora</p>
    </div>

    <div id="main-app" style="display:none; width: 100%; max-width: 600px;">
        <nav class="tabs">
            <button onclick="mudarAba('home')">🏠 Jogo</button>
            <button onclick="mudarAba('mapa-aba')">🗺️ Mapa</button>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </nav>

        <div class="container aba" id="home">
            <h1>Meu Pônei</h1>
            <img id="foto-perfil" class="avatar-grande">
            <p id="info-user"></p>
            <div class="actions">
                <button onclick="daily()">🎁 Recompensa Diária</button>
                <button onclick="missao()" style="margin: 10px 0;">🎮 Missão</button>
                <button onclick="toggleCartas()">🃏 Minhas Cartas</button>
            </div>
            <div id="lista-cartas" style="display:none;"></div>
        </div>

        <div class="container aba" id="mapa-aba" style="display:none;">
            <h1>Equestria</h1>
            <div class="mapa-wrapper">
                <img src="https://static.wikia.nocookie.net/mlp/images/a/a4/Map_of_Equestria_2015.jpg/revision/latest/scale-to-width-down/1000" class="mapa-img">
                <div class="ponto desbloqueado" style="top:55%; left:45%;" data-nome="Ponyville" data-desc="Cidade principal." onclick="clicarPonto(this)"></div>
                <div class="ponto desbloqueado" style="top:48%; left:52%;" data-nome="Canterlot" data-desc="Capital de Equestria." onclick="clicarPonto(this)"></div>
            </div>
            <div class="info-lugar">
                <h2 id="lugar-nome">Selecione um local</h2>
                <p id="lugar-desc">Clique nos pontos do mapa.</p>
            </div>
        </div>
    </div>

    <script>
        /* --- LÓGICA DE NAVEGAÇÃO --- */
        let poneySelecionado = "";

        function irParaSelecaoPoney() {
            const nome = document.getElementById('nome').value;
            const senha = document.getElementById('senha').value;
            if(!nome || !senha) return alert("Preencha os dados básicos primeiro!");
            
            document.getElementById('cadastro').style.display = 'none';
            document.getElementById('selecao-poney').style.display = 'block';
        }

        function voltarParaCadastro() {
            document.getElementById('selecao-poney').style.display = 'none';
            document.getElementById('cadastro').style.display = 'block';
        }

        function selecionarPoney(el, nome) {
            poneySelecionado = nome;
            document.querySelectorAll(".avatar").forEach(a => a.classList.remove("selected"));
            el.classList.add("selected");
        }

        async function finalizarCadastro() {
            if (!poneySelecionado) return alert("Selecione um pônei para sua foto de perfil!");

            const nome = document.getElementById('nome').value;
            const senha = document.getElementById('senha').value;
            const genero = document.getElementById('genero').value;

            const novoRegistro = { 
                nome, 
                poney: poneySelecionado, 
                genero,
                senha: btoa(senha),
                cartas: [] 
            };

            // Salva no IndexedDB e LocalStorage
            await adicionarItem(novoRegistro);
            localStorage.setItem("user_" + nome, JSON.stringify(novoRegistro));

            alert("Cadastro concluído com sucesso!");
            location.reload(); // Recarrega para ir ao login
        }

        /* --- RESTANTE DO CÓDIGO (DB E JOGO) MANTIDOS --- */
        const DB_NAME = 'EquestriaRPG_DB';
        const STORE_NAME = 'usuarios_rpg';

        function iniciarDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                };
                request.onsuccess = (e) => resolve(e.target.result);
            });
        }

        async function adicionarItem(item) {
            const db = await iniciarDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).add(item);
        }

        function mostrarLogin() {
            document.getElementById('cadastro').style.display = 'none';
            document.getElementById('login').style.display = 'block';
        }

        function mostrarCadastro() {
            document.getElementById('cadastro').style.display = 'block';
            document.getElementById('login').style.display = 'none';
        }

        function entrar() {
            const nome = document.getElementById('loginNome').value;
            const senha = btoa(document.getElementById('loginSenha').value);
            const userJson = localStorage.getItem("user_" + nome);
            if (!userJson) return alert("Usuário não encontrado!");
            const user = JSON.parse(userJson);
            if (user.senha !== senha) return alert("Senha incorreta!");
            sessionStorage.setItem("usuarioLogado", nome);
            iniciarApp(user);
        }

        function iniciarApp(user) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('info-user').innerText = `Olá, ${user.nome}!`;
            
            // Busca a imagem do pônei baseado no nome salvo
            const poneyMap = {
                'Twilight': 'https://media.wired.com/photos/59337ed17965e75f5f3c8503/3:2/w_2560%2Cc_limit/MLP-Twilight.jpg',
                'Fluttershy': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQcko1WFEG5FIPA6grJXd1cWJAXiSHAQP0LdzVhOdGJqpi-V0b0it6CxiKlAjuldaNIOs3DutSq5MAlWRPmgMXkgBnC9iWvw8Kga-tLL_Bh&s=10',
                'Rainbow': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSGk1NmbGDPaUJCLlN4uhOtHeJTsAWeBvh3Eg6_wJ0YIOOnbHjn3vZ4NbVPd8XT1D9i_4l21vlY-Xg4sX_8j5nZ5qZexcBFiDbxyxXq_xZdZQ&s=10',
                'Rarity': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQrX51t_lIv-XJw9lQHe2lkAWGZm6KBkOwrOIpBtnouBpYVWuQsaNGJvRgkhcnROL70xYvyWXk8IYnGdfxp51X6651Mkn2nq1vQg8R3jAWe&s=10',
                'Applejack': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfsKVElxJR57blusabDhZZgE8RK7COxWgPqowcREHKQ9etkKq3qQT2MfTBAOz0BaqwiXMGaVUsYR5XOHF3mAKRrQxPjIOuhl1ixwRp9JGF&s=10',
                'Pinkie': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLcS6NnetzUhMydMsgoVqH--MRvgEEOdM2pB8zBA2XFxGw68DoST-Honi6jydIv-1jm7eHEaLX_DptXWURHIAJ8tr3z4BCihCgEUMnGMpvoQ&s=10'
            };
            document.getElementById('foto-perfil').src = poneyMap[user.poney];
        }

        function mudarAba(abaId) {
            document.querySelectorAll('.aba').forEach(aba => aba.style.display = 'none');
            document.getElementById(abaId).style.display = 'block';
        }

        function formatarData(i) {
            let v = i.value.replace(/\D/g, "");
            if (v.length > 2) v = v.replace(/(\d{2})(\d)/, "$1/$2");
            if (v.length > 5) v = v.replace(/(\d{2})\/(\d{2})(\d)/, "$1/$2/$3");
            i.value = v;
        }

        function logout() { location.reload(); }
        
        function clicarPonto(el) {
            document.getElementById('lugar-nome').innerText = el.dataset.nome;
            document.getElementById('lugar-desc').innerText = el.dataset.desc;
        }
    </script>
</body>
</html>
