<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equestria RPG & Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS GERAIS --- */
        body { font-family: 'Quicksand', sans-serif; background: radial-gradient(circle, #fbc2eb 0%, #a6c1ee 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; position: relative; }
        .input-group { margin-bottom: 15px; text-align: left; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        
        button { background: #800080; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; margin-top: 10px; font-family: 'Quicksand', sans-serif; }
        button:hover { background: #600060; }
        .btn-visitante { background: #6c757d; }

        .avatar { width: 80px; height: 80px; border-radius: 50%; cursor: pointer; border: 4px solid transparent; transition: 0.3s; object-fit: cover; }
        .avatar.selected { border-color: #800080; transform: scale(1.1); box-shadow: 0 0 10px rgba(128,0,128,0.5); }
        .poney-list { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 20px 0; justify-items: center; }
        .link { color: #800080; cursor: pointer; margin-top: 15px; text-decoration: underline; font-size: 14px; }
        
        /* Mapa e App */
        .mapa-wrapper { position: relative; width: 100%; overflow: hidden; border-radius: 10px; margin-top: 15px; }
        .mapa-img { width: 100%; display: block; }
        .ponto { position: absolute; width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
        .desbloqueado { background: #28a745; }
        .avatar-grande { width: 120px; height: 120px; border-radius: 50%; margin: 20px auto; display: block; border: 4px solid #800080; object-fit: cover; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 10px; font-size: 12px; }
        #main-app { width: 100%; max-width: 600px; display: none; }

        /* --- CARTA MÁGICA --- */
        #portal-carta { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; }
        :root { --mlp-purple: #b79ced; --mlp-dark-purple: #6a1b9a; --mlp-gold: #ffd700; --magic-fire: #d500f9; }
        .envelope-container { position: relative; width: 400px; height: 280px; }
        .envelope-wrapper { position: relative; width: 100%; height: 100%; background-color: var(--mlp-purple); border-radius: 0 0 20px 20px; z-index: 1; }
        .envelope-front { position: absolute; bottom: 0; width: 0; height: 0; border-right: 200px solid #9575cd; border-bottom: 140px solid #9575cd; border-left: 200px solid #9575cd; border-top: 140px solid transparent; z-index: 3; border-radius: 0 0 20px 20px; pointer-events: none; }
        .flap { position: absolute; top: 0; width: 0; height: 0; border-left: 200px solid transparent; border-right: 200px solid transparent; border-top: 150px solid var(--mlp-dark-purple); transform-origin: top; transition: transform 0.6s ease; z-index: 4; pointer-events: none; }
        .letter { position: absolute; bottom: 10px; left: 5%; width: 90%; height: 100%; background: #ffffff; z-index: 2; transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 25px; box-sizing: border-box; border: 5px solid var(--mlp-gold); border-radius: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        
        .envelope-container:hover .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-container:hover .letter { transform: translateY(-200px); z-index: 5; }
        
        .btn-sim { background-color: #ff85a1; color: white; border-radius: 30px; font-size: 18px; width: 120px; margin: 0 auto; }
        #btn-nao { background-color: #e0e0e0; color: #666; border-radius: 30px; width: 100px; font-size: 14px; position: relative; }
        
        .burn-effect { animation: spikeFire 1.5s forwards !important; border: none !important; pointer-events: none; }
        @keyframes spikeFire {
            0% { transform: translateY(-200px) scale(1); background: white; }
            20% { background: var(--magic-fire); box-shadow: 0 0 50px var(--magic-fire); }
            100% { transform: translateY(-700px) scale(0); opacity: 0; filter: blur(20px); }
        }
    </style>
</head>
<body>

    <div class="container" id="cadastro">
        <form id="form-cadastro">
            <h1>Criar Conta</h1>
            <div class="input-group">
                <label>Nome de Usuário</label>
                <input id="nome" placeholder="Ex: TwilightSparkle" required>
            </div>
            <div class="input-group">
                <label>Data de Nascimento</label>
                <input id="nascimento" placeholder="dd/mm/aaaa" maxlength="10" oninput="formatarData(this)" required>
            </div>
            <div class="input-group">
                <label>Gênero</label>
                <select id="genero" required>
                    <option value="">Selecione...</option>
                    <option>Feminino</option>
                    <option>Masculino</option>
                    <option>Outro</option>
                </select>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Sua senha secreta" required>
            </div>
            <button type="button" onclick="irParaSelecaoPoney()">Próximo: Escolher Avatar</button>
        </form>
        <p class="link" onclick="mostrarLogin()">Já tenho conta</p>
    </div>

    <div class="container" id="selecao-poney" style="display:none;">
        <h1>Escolha seu Pônei</h1>
        <div class="poney-list">
            <img src="https://media.wired.com/photos/59337ed17965e75f5f3c8503/3:2/w_2560%2Cc_limit/MLP-Twilight.jpg" class="avatar" onclick="selecionarPoney(this,'Twilight')" alt="Twilight">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQcko1WFEG5FIPA6grJXd1cWJAXiSHAQP0LdzVhOdGJqpi-V0b0it6CxiKlAjuldaNIOs3DutSq5MAlWRPmgMXkgBnC9iWvw8Kga-tLL_Bh&s=10" class="avatar" onclick="selecionarPoney(this,'Fluttershy')" alt="Fluttershy">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSGk1NmbGDPaUJCLlN4uhOtHeJTsAWeBvh3Eg6_wJ0YIOOnbHjn3vZ4NbVPd8XT1D9i_4l21vlY-Xg4sX_8j5nZ5qZexcBFiDbxyxXq_xZdZQ&s=10" class="avatar" onclick="selecionarPoney(this,'Rainbow')" alt="Rainbow">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQrX51t_lIv-XJw9lQHe2lkAWGZm6KBkOwrOIpBtnouBpYVWuQsaNGJvRgkhcnROL70xYvyWXk8IYnGdfxp51X6651Mkn2nq1vQg8R3jAWe&s=10" class="avatar" onclick="selecionarPoney(this,'Rarity')" alt="Rarity">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfsKVElxJR57blusabDhZZgE8RK7COxWgPqowcREHKQ9etkKq3qQT2MfTBAOz0BaqwiXMGaVUsYR5XOHF3mAKRrQxPjIOuhl1ixwRp9JGF&s=10" class="avatar" onclick="selecionarPoney(this,'Applejack')" alt="Applejack">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLcS6NnetzUhMydMsgoVqH--MRvgEEOdM2pB8zBA2XFxGw68DoST-Honi6jydIv-1jm7eHEaLX_DptXWURHIAJ8tr3z4BCihCgEUMnGMpvoQ&s=10" class="avatar" onclick="selecionarPoney(this,'Pinkie')" alt="Pinkie">
        </div>
        <button onclick="finalizarCadastro()">Concluir Cadastro</button>
        <p class="link" onclick="voltarParaCadastro()">Voltar</p>
    </div>

    <div class="container" id="login" style="display:none;">
        <h1>Bem-vindo!</h1>
        <div class="input-group">
            <label>Nome</label>
            <input id="loginNome" placeholder="Seu nome">
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input id="loginSenha" type="password" placeholder="Sua senha">
        </div>
        <button onclick="entrar()">Entrar no Jogo</button>
        <button class="btn-visitante" onclick="entrarComoVisitante()">Entrar como visitante</button>
        <p class="link" onclick="mostrarCadastro()">Não tem conta? Criar agora</p>
    </div>

    <div id="portal-carta">
        <div class="envelope-container">
            <div class="flap"></div>
            <div class="envelope-front"></div>
            <div class="letter" id="letter">
                <div>
                    <h2 style="font-family: 'Dancing Script';">Caro(a) <span id="user-magic-name">Explorador</span>,</h2>
                    <p style="font-size: 14px;">Um novo destino aguarda por você em Equestria. Aceita este chamado?</p>
                </div>
                <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
                    <button class="btn-sim" onclick="queimarCarta()">SIM!</button>
                    <button id="btn-nao">NÃO</button>
                </div>
            </div>
            <div class="envelope-wrapper"></div>
        </div>
    </div>

    <div id="main-app">
        <nav class="tabs">
            <button onclick="mudarAba('home')">🏠 Personagem</button>
            <button onclick="mudarAba('mapa-aba')">🗺️ Mapa</button>
            <button style="background:#dc3545;" onclick="location.reload()">Sair</button>
        </nav>

        <div class="container aba" id="home">
            <h1>Perfil</h1>
            <img id="foto-perfil" class="avatar-grande">
            <h2 id="info-user"></h2>
            <p id="info-genero" style="color: #666; font-style: italic;"></p>
        </div>

        <div class="container aba" id="mapa-aba" style="display:none;">
            <h1>Mapa</h1>
            <div class="mapa-wrapper">
                <img src="https://static.wikia.nocookie.net/mlp/images/a/a4/Map_of_Equestria_2015.jpg/revision/latest/scale-to-width-down/1000" class="mapa-img">
                <div class="ponto desbloqueado" style="top:55%; left:45%;" data-nome="Ponyville" data-desc="Onde a amizade é mágica!" onclick="clicarPonto(this)"></div>
                <div class="ponto desbloqueado" style="top:48%; left:52%;" data-nome="Canterlot" data-desc="A capital real." onclick="clicarPonto(this)"></div>
            </div>
            <h3 id="lugar-nome">Selecione um local</h3>
            <p id="lugar-desc">Clique nos pontos verdes.</p>
        </div>
    </div>

    <script>
        let poneySelecionado = "";
        let usuarioSessao = null;
        const poneyMap = {
            'Twilight': 'https://media.wired.com/photos/59337ed17965e75f5f3c8503/3:2/w_2560%2Cc_limit/MLP-Twilight.jpg',
            'Fluttershy': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQcko1WFEG5FIPA6grJXd1cWJAXiSHAQP0LdzVhOdGJqpi-V0b0it6CxiKlAjuldaNIOs3DutSq5MAlWRPmgMXkgBnC9iWvw8Kga-tLL_Bh&s=10',
            'Rainbow': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSGk1NmbGDPaUJCLlN4uhOtHeJTsAWeBvh3Eg6_wJ0YIOOnbHjn3vZ4NbVPd8XT1D9i_4l21vlY-Xg4sX_8j5nZ5qZexcBFiDbxyxXq_xZdZQ&s=10',
            'Rarity': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQrX51t_lIv-XJw9lQHe2lkAWGZm6KBkOwrOIpBtnouBpYVWuQsaNGJvRgkhcnROL70xYvyWXk8IYnGdfxp51X6651Mkn2nq1vQg8R3jAWe&s=10',
            'Applejack': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfsKVElxJR57blusabDhZZgE8RK7COxWgPqowcREHKQ9etkKq3qQT2MfTBAOz0BaqwiXMGaVUsYR5XOHF3mAKRrQxPjIOuhl1ixwRp9JGF&s=10',
            'Pinkie': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLcS6NnetzUhMydMsgoVqH--MRvgEEOdM2pB8zBA2XFxGw68DoST-Honi6jydIv-1jm7eHEaLX_DptXWURHIAJ8tr3z4BCihCgEUMnGMpvoQ&s=10'
        };

        function mostrarLogin() { document.getElementById('cadastro').style.display = 'none'; document.getElementById('login').style.display = 'block'; }
        function mostrarCadastro() { document.getElementById('cadastro').style.display = 'block'; document.getElementById('login').style.display = 'none'; }
        
        function irParaSelecaoPoney() { 
            if(!document.getElementById('nome').value || !document.getElementById('genero').value) return alert("Preencha todos os campos!");
            document.getElementById('cadastro').style.display = 'none'; 
            document.getElementById('selecao-poney').style.display = 'block'; 
        }

        function selecionarPoney(el, nome) { poneySelecionado = nome; document.querySelectorAll(".avatar").forEach(a => a.classList.remove("selected")); el.classList.add("selected"); }

        function finalizarCadastro() {
            if(!poneySelecionado) return alert("Escolha um pônei!");
            const nome = document.getElementById('nome').value;
            const genero = document.getElementById('genero').value;
            const senha = btoa(document.getElementById('senha').value);
            const user = { nome, poney: poneySelecionado, genero, senha };
            localStorage.setItem("user_" + nome, JSON.stringify(user));
            alert("✨ Conta criada com sucesso! Faça login agora.");
            location.reload();
        }

        function entrar() {
            const nome = document.getElementById('loginNome').value;
            const senha = btoa(document.getElementById('loginSenha').value);
            const userJson = localStorage.getItem("user_" + nome);
            if (userJson) {
                const user = JSON.parse(userJson);
                if (user.senha === senha) { usuarioSessao = user; mostrarCartaMagica(user.nome); return; }
            }
            alert("Dados incorretos!");
        }

        function entrarComoVisitante() {
            usuarioSessao = { nome: "Visitante_" + Math.floor(Math.random()*99), poney: "Twilight", genero: "N/A" };
            mostrarCartaMagica(usuarioSessao.nome);
        }

        function mostrarCartaMagica(nome) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('portal-carta').style.display = 'flex';
            document.getElementById('user-magic-name').innerText = nome;
        }

        function queimarCarta() {
            document.getElementById('letter').classList.add('burn-effect');
            // Espera a animação acabar (1.5s)
            setTimeout(() => {
                alert("✨ O Spike enviou sua resposta para a Princesa Celestia! ✨");
                
                document.getElementById('portal-carta').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('info-user').innerText = usuarioSessao.nome;
                document.getElementById('info-genero').innerText = "Gênero: " + usuarioSessao.genero;
                document.getElementById('foto-perfil').src = poneyMap[usuarioSessao.poney];
            }, 1500); 
        }

        const btnNao = document.getElementById('btn-nao');
        btnNao.addEventListener('mouseover', function() {
            this.style.position = 'absolute';
            this.style.left = Math.random() * 250 + 'px';
            this.style.top = Math.random() * 150 + 'px';
        });

        function mudarAba(abaId) {
            document.querySelectorAll('.aba').forEach(a => a.style.display = 'none');
            document.getElementById(abaId).style.display = 'block';
        }

        function clicarPonto(el) {
            document.getElementById('lugar-nome').innerText = el.dataset.nome;
            document.getElementById('lugar-desc').innerText = el.dataset.desc;
        }

        function formatarData(i) {
            let v = i.value.replace(/\D/g, "");
            if (v.length > 2) v = v.replace(/(\d{2})(\d)/, "$1/$2");
            if (v.length > 5) v = v.replace(/(\d{2})\/(\d{2})(\d)/, "$1/$2/$3");
            i.value = v;
        }

        function voltarParaCadastro() {
            document.getElementById('selecao-poney').style.display = 'none';
            document.getElementById('cadastro').style.display = 'block';
        }
    </script>
</body>
</html>
